<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RoamRoom</title>
<style>
html,body{margin:0;height:100%;background:#F7F5F0;font-family:"SF Pro Rounded",ui-rounded,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif}
#ld{display:flex;height:100%;align-items:center;justify-content:center;color:#7A808A;font-size:14px;font-weight:650}
</style>
</head>
<body>
<div id="ld">Loading preview&hellip;</div>
<script>
(async()=>{try{
  const res=await fetch('roamroom.html',{cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  let html=await res.text();
  html=html.replace('</head>','<link rel="stylesheet" href="polish.css?v=20260706"></head>');
  document.open();document.write(html);document.close();
}catch(e){
  document.getElementById('ld').textContent='Could not load preview: '+e.message;
}})();
</script>
</body>
</html>
